services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: TestDB
      MYSQL_USER: app
      MYSQL_PASSWORD: appsecret
    ports:
      # Use 3307 on host if local MySQL (or another service) already uses 3306.
      - "3307:3306"
    volumes:
      - ./sql/ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  api:
    build: .
    environment:
      DATABASE_URL: mysql+asyncmy://app:appsecret@db:3306/TestDB
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-docker-compose-only}
      ENABLE_AUTH: "${ENABLE_AUTH:-true}"
      DEMO_USERNAME: demo
      DEMO_PASSWORD: demo
    ports:
      # Use 8001 on host if 8000 is already in use.
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
